name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Inject API base URL into app.js
        run: |
          # Replace localhost:3000 fallback with the deployed backend URL from the secret
          sed -i "s|'http://localhost:3000'|'${{ secrets.API_BASE_URL }}'|g" app.js
          echo "API_BASE_URL injected: ${{ secrets.API_BASE_URL }}"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact (static files only — no node_modules or .env)
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload only the static frontend files
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
