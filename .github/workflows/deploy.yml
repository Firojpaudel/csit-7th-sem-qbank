name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Inject API base URL into app.js (only if secret is set)
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
        run: |
          if [ -n "$API_BASE_URL" ]; then
            sed -i "s|'http://localhost:3000'|'${API_BASE_URL}'|g" app.js
            echo "✅ API_BASE_URL injected: ${API_BASE_URL}"
          else
            echo "⚠️  API_BASE_URL secret not set — keeping localhost:3000 (app still works, Neon sync disabled)"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload static frontend files
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
